<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Тест создания объекта</h1>
    <button onclick="testCreate()">Создать тестовый объект</button>
    <div id="result"></div>

    <script>
        const SUPABASE_URL = 'https://rqiutnpawsmqvmzewamc.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_K1aNLiU_605Z7WccyWWPbQ_or-QVNbX';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function testCreate() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Создание...';
           
            try {
                const testData = {
                    id: 'test-' + Date.now(),
                    name: 'Тестовый объект',
                    address: 'Тестовый адрес',
                    active: true
                };
               
                console.log('Отправляем данные:', testData);
               
                const { data, error } = await db.from('properties').insert([testData]);
               
                if (error) {
                    resultDiv.innerHTML = '❌ Ошибка: ' + error.message + '<br>Детали: ' + JSON.stringify(error);
                    console.error('Ошибка:', error);
                } else {
                    resultDiv.innerHTML = '✅ Успех! Объект создан: ' + JSON.stringify(data);
                    console.log('Успех:', data);
                }
            } catch (err) {
                resultDiv.innerHTML = '❌ Исключение: ' + err.message;
                console.error('Исключение:', err);
            }
        }
    </script>
</body>
</html>
