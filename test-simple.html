<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой тест</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .box { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🧪 ПРОСТОЙ ТЕСТ JS</h1>
   
    <div class="box">
        <h3>Тест 1: HTML</h3>
        <p>✅ HTML работает</p>
    </div>
   
    <div class="box">
        <h3>Тест 2: JavaScript</h3>
        <p id="js-test">⏳ Проверка...</p>
    </div>
   
    <div class="box">
        <h3>Тест 3: Supabase</h3>
        <p id="supabase-test">⏳ Проверка...</p>
    </div>

    <script>
        // Тест 2: JavaScript
        document.getElementById('js-test').innerHTML = '✅ JavaScript работает';
        document.getElementById('js-test').style.color = 'green';
       
        // Тест 3: Supabase
        (async function testSupabase() {
            try {
                document.getElementById('supabase-test').innerHTML = '⏳ Загрузка Supabase...';
               
                // Загружаем Supabase динамически
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
                script.onload = async function() {
                    try {
                        const db = window.supabase.createClient(
                            'https://rqiutnpawsmqvmzewamc.supabase.co',
                            'sb_publishable_K1aNLiU_605Z7WccyWWPbQ_or-QVNbX'
                        );
                       
                        const { data, error } = await db.from('properties').select('*').limit(1);
                       
                        if (error) throw error;
                       
                        document.getElementById('supabase-test').innerHTML =
                            '✅ Supabase работает!<br>Объектов: ' + (data ? data.length : 0);
                        document.getElementById('supabase-test').style.color = 'green';
                    } catch(e) {
                        document.getElementById('supabase-test').innerHTML =
                            '❌ Ошибка: ' + e.message;
                        document.getElementById('supabase-test').style.color = 'red';
                    }
                };
                script.onerror = function() {
                    document.getElementById('supabase-test').innerHTML =
                        '❌ Не загрузился скрипт Supabase';
                    document.getElementById('supabase-test').style.color = 'red';
                };
                document.head.appendChild(script);
               
            } catch(e) {
                document.getElementById('supabase-test').innerHTML =
                    '❌ Ошибка: ' + e.message;
                document.getElementById('supabase-test').style.color = 'red';
            }
        })();
    </script>
</body>
</html>
