<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Supabase</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .box { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
        .success { color: green; }
        .error { color: red; }
        .loading { color: orange; }
    </style>
</head>
<body>
    <h1>🧪 ТЕСТ SUPABASE</h1>
   
    <div class="box">
        <h3>Статус:</h3>
        <p id="status" class="loading">⏳ Начинаем...</p>
    </div>
   
    <div class="box">
        <h3>Результат запроса:</h3>
        <p id="result">—</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const statusEl = document.getElementById('status');
        const resultEl = document.getElementById('result');
       
        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = cls;
        }
       
        async function test() {
            try {
                setStatus(' Шаг 1: Создаём клиент Supabase...', 'loading');
               
                const db = window.supabase.createClient(
                    'https://rqiutnpawsmqvmzewamc.supabase.co',
                    'sb_publishable_K1aNLiU_605Z7WccyWWPbQ_or-QVNbX'
                );
               
                setStatus('⏳ Шаг 2: Делаем запрос к таблице properties...', 'loading');
               
                const { data, error } = await db.from('properties').select('*').limit(5);
               
                if (error) {
                    setStatus('❌ Ошибка Supabase', 'error');
                    resultEl.textContent = error.message + ' (код: ' + error.code + ')';
                    return;
                }
               
                setStatus('✅ Запрос успешен!', 'success');
                resultEl.textContent = 'Найдено объектов: ' + (data ? data.length : 0);
               
                if (data && data.length > 0) {
                    resultEl.innerHTML += '<br><br>Первый объект:<br>' +
                        JSON.stringify(data[0], null, 2);
                }
               
            } catch(e) {
                setStatus('❌ Исключение: ' + e.message, 'error');
                resultEl.textContent = e.stack;
            }
        }
       
        // Запуск через 1 секунду после загрузки
        setTimeout(test, 1000);
    </script>
</body>
</html>
