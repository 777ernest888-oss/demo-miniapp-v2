<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЕСТ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .box { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🧪 ТЕСТ TELEGRAM WEBVIEW</h1>
   
    <div class="box">
        <h3>1. HTML рендеринг</h3>
        <p class="success">✅ HTML отобразился</p>
    </div>
   
    <div class="box">
        <h3>2. JavaScript выполнение</h3>
        <p id="js-test">⏳ Проверка...</p>
    </div>
   
    <div class="box">
        <h3>3. Telegram SDK</h3>
        <p id="tg-test">⏳ Проверка...</p>
    </div>
   
    <div class="box">
        <h3>4. localStorage</h3>
        <p id="storage-test">⏳ Проверка...</p>
    </div>

    <script>
        // Тест 2: JavaScript
        try {
            document.getElementById('js-test').innerHTML = '✅ JavaScript работает';
            document.getElementById('js-test').className = 'success';
        } catch(e) {
            document.getElementById('js-test').innerHTML = '❌ JS ошибка: ' + e.message;
            document.getElementById('js-test').className = 'error';
        }
       
        // Тест 3: Telegram
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                document.getElementById('tg-test').innerHTML = '✅ Telegram SDK загружен<br>Версия: ' + window.Telegram.WebApp.version;
                document.getElementById('tg-test').className = 'success';
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            } else {
                document.getElementById('tg-test').innerHTML = '⚠️ Telegram SDK не найден';
                document.getElementById('tg-test').className = 'error';
            }
        } catch(e) {
            document.getElementById('tg-test').innerHTML = '❌ TG ошибка: ' + e.message;
            document.getElementById('tg-test').className = 'error';
        }
       
        // Тест 4: localStorage
        try {
            localStorage.setItem('test', '1');
            localStorage.removeItem('test');
            document.getElementById('storage-test').innerHTML = '✅ localStorage доступен';
            document.getElementById('storage-test').className = 'success';
        } catch(e) {
            document.getElementById('storage-test').innerHTML = '❌ localStorage заблокирован: ' + e.message;
            document.getElementById('storage-test').className = 'error';
        }
    </script>
</body>
</html>
